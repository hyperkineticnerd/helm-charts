apiVersion: v1
kind: Service
metadata:
  name: {{ include "home-assistant-otbr.fullname" . }}
  labels:
    {{- include "home-assistant-otbr.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.rest.port }}
      targetPort: rest
      protocol: TCP
      name: rest
  selector:
    {{- include "home-assistant-otbr.selectorLabels" . | nindent 4 }}
