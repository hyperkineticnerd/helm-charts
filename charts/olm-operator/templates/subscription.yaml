apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace.name }}
  {{- with .Values.subscription.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.subscription.labels }}
  labels: 
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  channel: {{ .Values.catalog.channel }}
  installPlanApproval: {{ .Values.install.installPlanApproval }}
  name: {{ .Values.name }}
  source: {{ .Values.catalog.source }}
  sourceNamespace: {{ .Values.catalog.sourceNamespace }}
  {{- with .Values.config }}
  config:
    {{- toYaml . | nindent 4 }}
  {{- end }}
