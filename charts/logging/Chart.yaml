apiVersion: v2
name: logging
description: A Helm chart for Kubernetes

type: application
version: 0.1.0
appVersion: "6.4.2"

dependencies:
  - name: olm-operator
    repository: https://charts.hknlab.io
    version: 0.2.5
    alias: loki
    condition: loki.enabled

  - name: olm-operator
    repository: https://charts.hknlab.io
    version: 0.2.5
    alias: logging
    condition: logging.enabled

  - name: olm-operator
    repository: https://charts.hknlab.io
    version: 0.2.5
    alias: observability
    condition: observability.enabled
