---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    service: server
spec:
  type: {{ .Values.service.type }}
{{- if eq .Values.service.type "ClusterIP" }}
  clusterIP: None
{{- end }}
  selector:
    app: {{ .Release.Name }}
  ports:
  - name: http
    protocol: TCP
    port: 8096
    targetPort: 8096
{{- if eq .Values.service.type "NodePort" }}
    nodePort: 8096
{{- end }}
  - name: https
    protocol: TCP
    port: 8920
    targetPort: 8920
{{- if eq .Values.service.type "NodePort" }}
    nodePort: 8920
{{- end }}
  - name: dlna
    protocol: UDP
    port: 1900
    targetPort: 1900
  - name: client
    protocol: UDP
    port: 7359
    targetPort: 7359
