# Default values for lvm-storage.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

operator:
  enabled: true
  name: lvms-operator

  namespace:
    enabled: true
    name: openshift-lvm-storage

  install:
    installPlanApproval: Automatic

  catalog:
    channel: stable-4.20
    source: redhat-operators
    sourceNamespace: openshift-marketplace

  operatorGroup:
    additionalNamespaces: # []
      - openshift-lvm-storage

deviceClasses:
  - name: vg1
    thinPoolConfig:
      name: thin-pool-1
      overprovisionRatio: 10
      sizePercent: 90
    deviceSelector:
      paths:
      # - /dev/disk/by-id/scsi-SDELL_PERC_H730_Mini_00d4601e4dc2a1bc2c0086525ba06d86 # R730
      # - /dev/disk/by-id/scsi-SDELL_PERC_H730P_Adp_00ae99f206f94dd12c0086525ba06d86 # R740
      - /dev/sdb
