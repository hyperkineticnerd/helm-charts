{{- range $name, $binding := .Values.placementBindings }}
{{- $bindName := $name }}
{{- $placementRef := $binding.placementRef }}
{{- $subjects := $binding.subjects }}
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $name }}
  namespace: open-cluster-managment-policies
{{- if $placementRef }}
placementRef:
  {{- $placementRef | toYaml | nindent 2 }}
{{- end }}
{{- if $binding.subjects }}
{{- range $subjects }}
subjects:
  {{- . | toYaml | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
