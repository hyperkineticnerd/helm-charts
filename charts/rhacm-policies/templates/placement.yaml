{{- range $name, $placement := .Values.placements }}
{{- $placementName := $name }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: open-cluster-management-policies
spec:
  {{- $placement | toYaml | nindent 2 }}
{{- end }}
